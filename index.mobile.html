<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Increvise Mobile</title>
    <link rel="stylesheet" href="./style.css" />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core@8/dist/ionic/ionic.esm.js"
    ></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core@8/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core@8/css/ionic.bundle.css" />
  </head>

  <body>
    <ion-app>
      <ion-tabs>
        <ion-tab tab="workspace">
          <ion-header>
            <ion-toolbar>
              <ion-title>Increvise</ion-title>
            </ion-toolbar>
          </ion-header>
          <ion-content>
            <workspace-manager mobile></workspace-manager>
          </ion-content>
        </ion-tab>

        <ion-tab tab="review">
          <ion-header>
            <ion-toolbar>
              <ion-title>Review</ion-title>
            </ion-toolbar>
          </ion-header>
          <ion-content>
            <div class="mobile-review-panel">
              <div class="revision-list-container">
                <revision-list></revision-list>
              </div>
              <div class="editor-panel">
                <editor-panel>
                  <codemirror-viewer slot="codemirror" content="Select a file to revise">
                  </codemirror-viewer>
                  <pdf-viewer slot="pdf" class="hidden"></pdf-viewer>
                  <html-viewer slot="html" class="hidden"></html-viewer>
                  <markdown-viewer slot="markdown" class="hidden"></markdown-viewer>
                  <video-viewer slot="video" class="hidden"></video-viewer>
                  <flashcard-viewer slot="flashcard" class="hidden"></flashcard-viewer>
                </editor-panel>
                <feedback-bar></feedback-bar>
              </div>
            </div>
          </ion-content>
        </ion-tab>

        <ion-tab tab="files">
          <ion-header>
            <ion-toolbar>
              <ion-title>Files</ion-title>
            </ion-toolbar>
          </ion-header>
          <ion-content>
            <file-manager></file-manager>
          </ion-content>
        </ion-tab>

        <ion-tab-bar slot="bottom">
          <ion-tab-button tab="workspace">
            <ion-icon name="folder"></ion-icon>
            <ion-label>Workspace</ion-label>
          </ion-tab-button>

          <ion-tab-button tab="review">
            <ion-icon name="book"></ion-icon>
            <ion-label>Review</ion-label>
          </ion-tab-button>

          <ion-tab-button tab="files">
            <ion-icon name="document"></ion-icon>
            <ion-label>Files</ion-label>
          </ion-tab-button>
        </ion-tab-bar>
      </ion-tabs>
    </ion-app>

    <div id="toast" class="toast"></div>

    <script type="module" src="/src/renderer/index.js"></script>
  </body>
</html>
