<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Increvise Mobile</title>
    <link rel="stylesheet" href="./style.css" />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@ionic/core@8/dist/ionic/ionic.esm.js"
    ></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core@8/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core@8/css/ionic.bundle.css" />
  </head>

  <body>
    <ion-app>
      <ion-tabs>
        <ion-tab tab="workspace">
          <ion-header>
            <ion-toolbar class="mobile-toolbar">
              <ion-title>Increvise</ion-title>
            </ion-toolbar>
          </ion-header>
          <ion-content>
            <workspace-manager mobile></workspace-manager>
          </ion-content>
        </ion-tab>

        <ion-tab tab="queue">
          <ion-header>
            <ion-toolbar class="mobile-toolbar">
              <ion-title>Review Queue</ion-title>
            </ion-toolbar>
          </ion-header>
          <ion-content>
            <div class="mobile-queue-panel">
              <revision-list></revision-list>
            </div>
          </ion-content>
        </ion-tab>

        <ion-tab tab="editor">
          <ion-header>
            <ion-toolbar class="mobile-toolbar">
              <ion-title>Editor</ion-title>
            </ion-toolbar>
          </ion-header>
          <ion-content>
            <div class="mobile-editor-panel">
              <editor-panel>
                <codemirror-viewer slot="codemirror" content="Select a file to revise">
                </codemirror-viewer>
                <pdf-viewer slot="pdf" class="hidden"></pdf-viewer>
                <html-viewer slot="html" class="hidden"></html-viewer>
                <markdown-viewer slot="markdown" class="hidden"></markdown-viewer>
                <video-viewer slot="video" class="hidden"></video-viewer>
                <flashcard-viewer slot="flashcard" class="hidden"></flashcard-viewer>
              </editor-panel>
              <feedback-bar></feedback-bar>
            </div>
          </ion-content>
        </ion-tab>

        <ion-tab-bar slot="bottom">
          <ion-tab-button tab="workspace">
            <ion-icon name="folder"></ion-icon>
            <ion-label>Workspace</ion-label>
          </ion-tab-button>

          <ion-tab-button tab="queue">
            <ion-icon name="list"></ion-icon>
            <ion-label>Queue</ion-label>
          </ion-tab-button>

          <ion-tab-button tab="editor">
            <ion-icon name="create"></ion-icon>
            <ion-label>Editor</ion-label>
          </ion-tab-button>
        </ion-tab-bar>
      </ion-tabs>
    </ion-app>

    <!-- Keep file-manager mounted on mobile for workspace event handling -->
    <file-manager class="hidden" aria-hidden="true"></file-manager>

    <div id="toast" class="toast"></div>

    <script type="module" src="/src/renderer/index.js"></script>
  </body>
</html>
